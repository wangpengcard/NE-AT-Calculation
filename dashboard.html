<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海伦农事积温 - 数据驱动版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; overflow: hidden; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        #sidebar { width: 280px; height: 100%; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 15px; float: left; z-index: 10; }
        #main-area { height: 100%; margin-left: 280px; display: flex; flex-direction: column; padding: 0; background: #fff; }
        #top-controls { padding: 8px 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; height: 55px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .view-btn-group .btn { font-weight: bold; border-radius: 4px; padding: 2px 12px; font-size: 0.9rem; }
        #chart-container { flex-grow: 1; position: relative; padding: 10px 20px; overflow: hidden; display: flex; flex-direction: column; }
        #status-bar { display: flex; gap: 10px; margin-bottom: 8px; flex-shrink: 0; }
        .status-box { flex: 1; background: #f8f9fa; border: 1px solid #eee; border-left: 3px solid #ccc; padding: 4px 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .status-label { font-size: 0.8rem; color: #666; font-weight: bold; }
        .status-val { font-size: 1.1rem; font-weight: bold; color: #333; }
        #wind-strip { display: flex; justify-content: space-between; background: #eef5ff; padding: 4px 0 4px 45px; border-radius: 4px; margin-bottom: 5px; height: 55px; flex-shrink: 0; }
        .wind-cell { flex: 1; text-align: center; display: flex; flex-direction: column; justify-content: center; font-size: 0.7rem; color: #555; border-right: 1px solid rgba(0,0,0,0.05); }
        .wind-arrow { font-size: 1.0rem; color: #0d6efd; display: block; transition: transform 0.3s; }
        .town-select { width: 100%; padding: 6px; font-weight: bold; font-size: 0.95rem; border-radius: 4px; margin-bottom: 15px; }
        .cal-select { padding: 4px; font-size: 0.85rem; font-weight: bold; border-radius: 4px; width: 48%; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 5px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; border-radius: 3px; position: relative; background: #f8f9fa; }
        .cal-day:hover { background: #e2e6ea; }
        .cal-day.active { border: 2px solid #0d6efd; font-weight: bold; background: #fff; }
        .cal-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; bottom: 2px; }
        .dot-green { background-color: #198754; } 
        .dot-yellow { background-color: #ffc107; } 
        .dot-gray { background-color: #adb5bd; } 
        #year-checkboxes label { margin-right: 12px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .canvas-wrapper { flex-grow: 1; position: relative; width: 100%; min-height: 0; }
    </style>
</head>
<body>

<div id="loading" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);z-index:9999;display:flex;justify-content:center;align-items:center;">
    <div class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p id="loading-text" class="mt-2 fw-bold">海伦农事积温 正在自检 CSV 资源...</p>
    </div>
</div>

<div id="sidebar">
    <h5 class="fw-bold mb-3 text-primary"><i class="fas fa-satellite-dish"></i> 海伦农事积温</h5>
    <div class="mb-4">
        <label class="small text-muted fw-bold mb-1">乡镇站点选择</label>
        <select id="townSelect" class="town-select form-select" onchange="onTownChange()"></select>
    </div>
    <div class="mb-1">
        <label class="small text-muted fw-bold mb-1">日历与状态</label>
        <div class="d-flex justify-content-between mb-2">
            <select id="calYear" class="cal-select form-select" onchange="onCalFilterChange()"></select>
            <select id="calMonth" class="cal-select form-select" onchange="onCalFilterChange()">
                <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
                <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
                <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
            </select>
        </div>
        <div class="calendar-grid small text-muted text-center mb-1 fw-bold" style="background:#eee; padding:2px 0;">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div id="calendar-body" class="calendar-grid"></div>
    </div>
</div>

<div id="main-area">
    <div id="top-controls">
        <div class="btn-group view-btn-group" role="group">
            <input type="radio" class="btn-check" name="viewRadio" id="v1" checked onclick="switchView('weather')">
            <label class="btn btn-outline-primary" for="v1">实况天气</label>
            <input type="radio" class="btn-check" name="viewRadio" id="v2" onclick="switchView('annual')">
            <label class="btn btn-outline-success" for="v2">年度积温</label>
            <input type="radio" class="btn-check" name="viewRadio" id="v3" onclick="switchView('monthly')">
            <label class="btn btn-outline-warning" for="v3">月度积温</label>
        </div>
        <div id="dynamic-controls">
            <div class="ctrl-group ctrl-weather"><span class="fw-bold text-dark h5" id="weather-date-label">--</span></div>
            <div class="ctrl-group ctrl-years d-none" id="year-checkboxes"></div>
        </div>
    </div>
    <div id="chart-container">
        <div id="weather-components">
            <div id="status-bar">
                <div class="status-box" style="border-left-color: #dc3545;"><span class="status-label">最高温</span><span class="status-val text-danger" id="st-max-t">--</span></div>
                <div class="status-box" style="border-left-color: #0d6efd;"><span class="status-label">最低温</span><span class="status-val text-primary" id="st-min-t">--</span></div>
                <div class="status-box" style="border-left-color: #fd7e14;"><span class="status-label">最大风</span><span class="status-val text-warning" id="st-max-w">--</span></div>
                <div class="status-box" style="border-left-color: #0dcaf0;"><span class="status-label">日降水</span><span class="status-val text-info" id="st-max-r">--</span></div>
            </div>
            <div id="wind-strip"></div>
        </div>
        <div class="canvas-wrapper"><canvas id="mainChart"></canvas></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // 1. 注册数值标签插件并默认禁用
    Chart.register(ChartDataLabels);
    Chart.defaults.set('plugins.datalabels', { display: false });

    const TOWN_LIST = [
        {"num": 1, "name": "前进镇", "id": "qianjin"}, {"num": 2, "name": "共合镇", "id": "gonghe"},
        {"num": 3, "name": "永和镇", "id": "yonghe"}, {"num": 4, "name": "联发镇", "id": "lianfa"},
        {"num": 5, "name": "东风镇", "id": "dongfeng"}, {"num": 6, "name": "乐业乡", "id": "leye"},
        {"num": 7, "name": "福民乡", "id": "fumin"}, {"num": 8, "name": "海兴镇", "id": "haixing"},
        {"num": 9, "name": "向荣镇", "id": "xiangrong"}, {"num": 10, "name": "伦河镇", "id": "lunhe"},
        {"num": 11, "name": "共荣镇", "id": "gongrong"}, {"num": 12, "name": "双录乡", "id": "shuanglu"},
        {"num": 13, "name": "爱民乡", "id": "aimin"}, {"num": 14, "name": "百祥镇", "id": "baixiang"},
        {"num": 15, "name": "东林镇", "id": "donglin"}, {"num": 16, "name": "丰山乡", "id": "fengshan"},
        {"num": 17, "name": "海北镇", "id": "haibei"}, {"num": 18, "name": "海伦农场", "id": "hlnc"},
        {"num": 19, "name": "海伦镇", "id": "hailun"}, {"num": 20, "name": "海南乡", "id": "hainan"},
        {"num": 21, "name": "红光农场", "id": "hgnc"}, {"num": 22, "name": "祥富镇", "id": "xiangfu"},
        {"num": 23, "name": "永富镇", "id": "yongfu"}, {"num": 24, "name": "扎音河乡", "id": "zhayinhe"},
        {"num": 25, "name": "长发镇", "id": "changfa"}
    ];

    let RAW_DATA = {}, AVAILABLE_YEARS = [], CHART_INSTANCE = null;
    let STATE = { view: 'weather', town: '前进镇', calYear: null, calMonth: null, date: null, selectedYears: [] };

    // 辅助插件：垂直指示线
    const verticalHoverLinePlugin = {
        id: 'verticalHoverLine',
        afterDraw: (chart, args, options) => {
            if (options === false) return;
            if (chart.tooltip?._active?.length) {
                const activePoint = chart.tooltip._active[0];
                const x = activePoint.element.x;
                const { ctx, chartArea: { top, bottom } } = chart;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, top);
                ctx.lineTo(x, bottom);
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(128, 128, 128, 0.8)';
                ctx.setLineDash([2, 2]);
                ctx.stroke();
                ctx.restore();
            }
        }
    };
    Chart.register(verticalHoverLinePlugin);

    window.onload = function() { localStorage.clear(); loadAllData(); };

    async function loadAllData() {
        const TRY_YEARS = [2022, 2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030];
        const promises = TRY_YEARS.map(year => fetchYearData(year));
        await Promise.all(promises);
        if (AVAILABLE_YEARS.length === 0) {
            document.getElementById('loading-text').innerHTML = "<b class='text-danger'>未发现 CSV 数据！</b>";
            return;
        }
        const maxYear = Math.max(...AVAILABLE_YEARS);
        const firstTown = Object.keys(RAW_DATA[maxYear])[0];
        const latestDate = Object.keys(RAW_DATA[maxYear][firstTown]).sort().pop(); 
        const [y, m, d] = latestDate.split('-').map(Number);
        STATE.calYear = y; STATE.calMonth = m; STATE.date = latestDate; STATE.selectedYears = [y];
        initTownMenu(); initCalYearSelect(); initYearCheckboxes(); refreshUI();
    }

    function fetchYearData(year) {
        return new Promise(resolve => {
            Papa.parse(`${year}.csv`, {
                download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: (results) => {
                    if (results.data && results.data.length > 0) { processRawData(year, results.data); AVAILABLE_YEARS.push(year); }
                    resolve();
                }, error: () => resolve() 
            });
        });
    }

    function processRawData(year, data) {
        if(!RAW_DATA[year]) RAW_DATA[year] = {};
        data.forEach(row => {
            if (!row.date || !row.town) return;
            if (!RAW_DATA[year][row.town]) RAW_DATA[year][row.town] = {};
            if (!RAW_DATA[year][row.town][row.date]) RAW_DATA[year][row.town][row.date] = [];
            RAW_DATA[year][row.town][row.date].push(row);
        });
    }

    function refreshUI() {
        document.getElementById('calYear').value = STATE.calYear;
        document.getElementById('calMonth').value = STATE.calMonth;
        renderCalendar(); renderChart();
        document.getElementById('loading').style.display = 'none';
    }

    function initTownMenu() {
        const sel = document.getElementById('townSelect');
        TOWN_LIST.forEach(t => { let opt = document.createElement('option'); opt.value = t.name; opt.text = `${t.num}. ${t.name}`; sel.appendChild(opt); });
    }

    function initCalYearSelect() {
        const sel = document.getElementById('calYear');
        AVAILABLE_YEARS.sort((a,b)=>b-a).forEach(y => { let opt = document.createElement('option'); opt.value = y; opt.text = y + "年"; sel.appendChild(opt); });
    }

    function initYearCheckboxes() {
        const container = document.getElementById('year-checkboxes'); container.innerHTML = "";
        AVAILABLE_YEARS.forEach((y, idx) => {
            const colors = ['#198754', '#0d6efd', '#dc3545', '#ffc107', '#6610f2'];
            let wrap = document.createElement('div'); wrap.className = 'form-check form-check-inline mb-0';
            wrap.innerHTML = `<input class="form-check-input" type="checkbox" id="chk-${y}" value="${y}" ${STATE.selectedYears.includes(y)?'checked':''}>
                              <label class="form-check-label small fw-bold" for="chk-${y}" style="color:${colors[idx%5]}">${y}</label>`;
            wrap.querySelector('input').onchange = function() {
                const yr = parseInt(this.value);
                if(this.checked) STATE.selectedYears.push(yr); else STATE.selectedYears = STATE.selectedYears.filter(i => i !== yr);
                renderChart();
            };
            container.appendChild(wrap);
        });
    }

    function onTownChange() { STATE.town = document.getElementById('townSelect').value; renderCalendar(); renderChart(); }
    function onCalFilterChange() { STATE.calYear = parseInt(document.getElementById('calYear').value); STATE.calMonth = parseInt(document.getElementById('calMonth').value); renderCalendar(); }
    function switchView(viewName) {
        STATE.view = viewName;
        document.querySelectorAll('.ctrl-group').forEach(el => el.classList.add('d-none'));
        document.getElementById('weather-components').style.display = (viewName === 'weather' ? 'block' : 'none');
        if(viewName === 'weather') document.querySelector('.ctrl-weather').classList.remove('d-none');
        else document.querySelector('.ctrl-years').classList.remove('d-none');
        renderChart();
    }

    function renderCalendar() {
        const container = document.getElementById('calendar-body'); container.innerHTML = "";
        const firstDay = new Date(STATE.calYear, STATE.calMonth - 1, 1).getDay();
        const daysInMonth = new Date(STATE.calYear, STATE.calMonth, 0).getDate();
        for(let i=0; i<firstDay; i++) container.appendChild(document.createElement('div'));
        for(let d=1; d<=daysInMonth; d++) {
            let dateStr = `${STATE.calYear}-${String(STATE.calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let cell = document.createElement('div'); cell.className = 'cal-day'; cell.innerText = d;
            if(dateStr === STATE.date) cell.classList.add('active');
            let dotClass = 'dot-gray';
            const dayData = RAW_DATA[STATE.calYear]?.[STATE.town]?.[dateStr];
            if(dayData) dotClass = (dayData.length === 24 && dayData.every(r => r.flag === 0)) ? 'dot-green' : 'dot-yellow';
            cell.innerHTML += `<div class="cal-dot ${dotClass}"></div>`;
            cell.onclick = () => { STATE.date = dateStr; renderCalendar(); if(STATE.view==='weather') renderChart(); };
            container.appendChild(cell);
        }
    }

    function renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(CHART_INSTANCE) CHART_INSTANCE.destroy();
        
        const commonOptions = { 
            responsive: true, 
            maintainAspectRatio: false, 
            interaction: { mode: 'index', intersect: false }, 
            plugins: { verticalHoverLine: true, datalabels: { display: false } }
        };

        if(STATE.view === 'weather') {
            document.getElementById('weather-date-label').innerText = STATE.date;
            const dayData = (RAW_DATA[STATE.date.split('-')[0]]?.[STATE.town]?.[STATE.date] || []).sort((a,b)=>a.hour-b.hour);
            fillWeatherCards(dayData);
            CHART_INSTANCE = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Array.from({length:24}, (_,i)=>i),
                    datasets: [
                        { type: 'line', label: '温度(°C)', data: Array(24).fill(null).map((_,h)=>dayData.find(d=>d.hour===h)?.temp), borderColor: '#dc3545', yAxisID: 'y', tension: 0.5, cubicInterpolationMode: 'monotone' },
                        { type: 'bar', label: '降水(mm)', data: Array(24).fill(null).map((_,h)=>dayData.find(d=>d.hour===h)?.precip), backgroundColor: 'rgba(13,202,240,0.5)', yAxisID: 'y1' }
                    ]
                },
                options: { 
                    ...commonOptions, 
                    scales: { 
                        y: { beginAtZero: true, title: { display: true, text: '温度 (℃)', color: '#888',font: { size: 12,weight: 'normal' } } },
                        y1: { position: 'right', suggestedMax: 10, grid: { drawOnChartArea: false }, title: { display: true, text: '降水量 (mm)', color: '#888',font: { size: 12,weight: 'normal' } } } 
                    } 
                }
            });
        } else if(STATE.view === 'annual') {
            const labels = []; let s = new Date(2000,3,1); while(s <= new Date(2000,8,30)){ labels.push(`${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}`); s.setDate(s.getDate()+1); }
            const ds = [];
            STATE.selectedYears.forEach((y, i) => {
                const c = ['#198754', '#0d6efd', '#dc3545', '#ffc107', '#6610f2'][i%5];
                let accAct = 0, accEff = 0;
                const dataA = labels.map(l => {
                    const dayData = RAW_DATA[y]?.[STATE.town]?.[`${y}-${l}`];
                    if (!dayData) return null;
                    accAct += (dayData[0]?.act_add || 0);
                    return accAct;
                });
                const dataE = labels.map(l => {
                    const dayData = RAW_DATA[y]?.[STATE.town]?.[`${y}-${l}`];
                    if (!dayData) return null;
                    accEff += (dayData[0]?.eff_add || 0);
                    return accEff;
                });
                ds.push({ label: y+'活动', data: dataA, borderColor: c, pointRadius: 0, spanGaps: false, tension: 0.5, cubicInterpolationMode: 'monotone' });
                ds.push({ label: y+'有效', data: dataE, borderColor: c, borderDash: [5,5], pointRadius: 0, spanGaps: false, tension: 0.5, cubicInterpolationMode: 'monotone' });
            });
            CHART_INSTANCE = new Chart(ctx, { 
                type: 'line', 
                data: { labels, datasets: ds }, 
                options: {
                    ...commonOptions,
                    scales: { 
                        y: { beginAtZero: true, title: { display: true, text: '积温 (℃·d)', color: '#888',font: { size: 12,weight: 'normal' } } } 
                    }
                } 
            });
        } else {
            const labels = ['4月','5月','6月','7月','8月','9月'];
            const ds = [];
            const getPattern = (color) => {
                const pCanvas = document.createElement('canvas');
                pCanvas.width = 10; pCanvas.height = 10;
                const pCtx = pCanvas.getContext('2d');
                pCtx.strokeStyle = color; pCtx.lineWidth = 1.5;
                pCtx.beginPath(); pCtx.moveTo(0, 10); pCtx.lineTo(10, 0); pCtx.stroke();
                return ctx.createPattern(pCanvas, 'repeat');
            };
            STATE.selectedYears.forEach((y, i) => {
                const c = ['#198754', '#0d6efd', '#dc3545', '#ffc107', '#6610f2'][i%5];
                const months = [4,5,6,7,8,9];
                const actVals = months.map(m => {
                    const monthKeys = Object.keys(RAW_DATA[y]?.[STATE.town] || {}).filter(d => parseInt(d.split('-')[1])===m);
                    if (monthKeys.length === 0) return null;
                    let sum = 0;
                    monthKeys.forEach(d => { sum += (RAW_DATA[y][STATE.town][d][0]?.act_add || 0); });
                    return sum;
                });
                const effVals = months.map(m => {
                    const monthKeys = Object.keys(RAW_DATA[y]?.[STATE.town] || {}).filter(d => parseInt(d.split('-')[1])===m);
                    if (monthKeys.length === 0) return null;
                    let sum = 0;
                    monthKeys.forEach(d => { sum += (RAW_DATA[y][STATE.town][d][0]?.eff_add || 0); });
                    return sum;
                });
                const precipVals = months.map(m => {
                    const monthKeys = Object.keys(RAW_DATA[y]?.[STATE.town] || {}).filter(d => parseInt(d.split('-')[1])===m);
                    if (monthKeys.length === 0) return null;
                    let sum = 0;
                    monthKeys.forEach(dateStr => { (RAW_DATA[y][STATE.town][dateStr] || []).forEach(row => sum += (row.precip || 0)); });
                    return sum;
                });

                ds.push({ label: y+'活动', data: actVals, backgroundColor: c, yAxisID: 'y' });
                ds.push({ label: y+'有效', data: effVals, backgroundColor: getPattern(c), borderColor: c, borderWidth: 1, yAxisID: 'y' });
                ds.push({ label: y+'降雨', type: 'line', data: precipVals, borderColor: c, backgroundColor: c, borderDash: [2, 2], pointStyle: 'circle', pointRadius: 4, yAxisID: 'y1' });
            });
            CHART_INSTANCE = new Chart(ctx, { 
                type: 'bar', 
                data: { labels, datasets: ds }, 
                options: { 
                    ...commonOptions, 
                    plugins: { 
                        ...commonOptions.plugins, 
                        verticalHoverLine: false,
                        // 局部开启数值显示
                        datalabels: {
                            display: true,
                            align: 'top',
                            anchor: 'end',
                            offset: 2,
                            font: { size: 14, weight: 'bold' },
                            formatter: (v) => v !== null ? v.toFixed(1) : ''
                        }
                    }, 
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            title: { display: true, text: '月度积温 (℃·d)', color: '#888',font: { size: 12,weight: 'normal' } } 
                        },
                        y1: { 
                            position: 'right', 
                            title: { display: true, text: '降水量 (mm)', color: '#888',font: { size: 12,weight: 'normal' } }, 
                            grid: { drawOnChartArea: false } 
                        } 
                    } 
                } 
            });
        }
    }

    function fillWeatherCards(data) {
        const strip = document.getElementById('wind-strip'); strip.innerHTML = "";
        let maxT=-99, minT=99, maxW=0, sumR=0;
        for(let h=0; h<24; h++) {
            const d = data.find(x => x.hour === h);
            let arrowHtml = '-', p = '';
            if(d && d.flag === 0) {
                arrowHtml = `<i class="fas fa-long-arrow-alt-up wind-arrow" style="transform: rotate(${(d.wind_d + 180) % 360}deg);"></i>`;
                p = Math.round(d.wind_p);
                if(d.temp > maxT) maxT = d.temp; if(d.temp < minT) minT = d.temp;
                if(d.wind_p > maxW) maxW = d.wind_p; sumR += d.precip;
            }
            strip.innerHTML += `<div class="wind-cell"><div>${arrowHtml}</div><div>${p}</div></div>`;
        }
        document.getElementById('st-max-t').innerText = data.length ? maxT.toFixed(1)+"°" : '--';
        document.getElementById('st-min-t').innerText = data.length ? minT.toFixed(1)+"°" : '--';
        document.getElementById('st-max-w').innerText = data.length ? Math.round(maxW)+"级" : '--';
        document.getElementById('st-max-r').innerText = data.length ? sumR.toFixed(1)+"mm" : '--';
    }
</script>
</body>
</html>
